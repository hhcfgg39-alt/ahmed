<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="bg-slate-900/50 backdrop-blur-xl p-8 rounded-3xl w-full max-w-2xl border border-slate-700 shadow-2xl text-center">
        <h1 class="text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
            OCR Pro AI
        </h1>
        <p class="text-slate-400 mb-8">أداة احترافية لاستخراج النصوص</p>

        <label for="img" class="cursor-pointer block w-full py-8 mb-6 border-2 border-dashed border-slate-600 rounded-2xl hover:border-blue-500 transition-all text-slate-300">
            <span id="fileName">📁 اضغط هنا لرفع صورتك</span>
            <input type="file" id="img" class="hidden" onchange="updateFileName()">
        </label>

        <button onclick="start()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-500/20">
            بدء التحليل
        </button>

        <textarea id="res" class="w-full mt-6 h-48 bg-black/40 p-5 rounded-2xl text-white border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="النص المستخرج سيظهر هنا..."></textarea>
    </div>

    <script>
        // دالة تظهر اسم الصورة لما تختارها
        function updateFileName() {
            const input = document.getElementById('img');
            const label = document.getElementById('fileName');
            if(input.files.length > 0) {
                label.innerText = "✅ تم اختيار: " + input.files[0].name;
            }
        }

        async function start() {
            const imgInput = document.getElementById('img');
            const res = document.getElementById('res');
            if(imgInput.files.length === 0) return alert("من فضلك اختر صورة أولاً!");
            
            res.value = "جاري المعالجة... يرجى الانتظار...";
            try {
                const { data: { text } } = await Tesseract.recognize(imgInput.files[0], 'ara+eng');
                res.value = text;
            } catch(e) {
                res.value = "حدث خطأ أثناء المعالجة، حاول مرة أخرى.";
            }
        }
    </script>
</body>
</html>
