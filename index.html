<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>👑 زخرفة الأسماء برو - VexioX Pro</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .main-card { max-width: 600px; margin: 30px auto; background: linear-gradient(180deg, #1a1a1f, #0d0d11); padding: 40px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #ffb700; font-size: 2.5rem; text-shadow: 0 0 20px rgba(255,183,0,0.5); }
        input { width: 90%; padding: 20px; background: #000; border: 2px solid #222; border-radius: 15px; color: #ffb700; font-size: 1.2rem; text-align: center; outline: none; }
        input:focus { border-color: #ffb700; }
        .btn-gen { margin-top: 20px; padding: 15px 40px; background: #ffb700; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.4s; }
        .btn-gen:hover { transform: scale(1.1); box-shadow: 0 0 20px #ffb700; }
        #result { margin-top: 30px; padding: 25px; border: 2px dashed #ffb700; border-radius: 20px; font-size: 2rem; color: #fff; min-height: 80px; }
        .grid-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; margin-top: 30px; }
        .sym { background: #1a1a1f; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 1.5rem; }
        .sym:hover { background: #ffb700; color: #000; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>👑 VexioX Pro</h1>
    <input type="text" id="nameInput" placeholder="أدخل الاسم للزخرفة...">
    <button class="btn-gen" onclick="makeDecor()">✨ توليد الزخرفة</button>
    <div id="result">---</div>
</div>

<div class="main-card">
    <h2>🔱 مكتبة الرموز الأسطورية</h2>
    <div class="grid-box" id="symBox"></div>
</div>

<script>
function makeDecor() {
    let n = document.getElementById("nameInput").value || "Name";
    let p = ["♛","★","⚡","『","꧁","彡","シ","×","✧","❃","ஜ","✪","➤","✠","ツ","❦","Ω","۞","♚","♠","♣","♥","♦"];
    let r = p[Math.floor(Math.random()*p.length)] + " " + n + " " + p[Math.floor(Math.random()*p.length)];
    document.getElementById("result").innerText = r;
}

const syms = "♛★⚡『꧁彡〆シ×✧❃ஜ✪➤✠웃ツ❦Ω۞♚♠♣♥♦☀☁☂☃☄★☆☇☈☉☊☋☌☍☎☏☐☑☒☓☖☗☘☙☚☛☜☝☞☟☠☡☢☣☤☥☦☧☨☩☪☫☬☭☮☯☰☱☲☳☴☵☶☷☸☹☺☻☼☽☾☿♀♁♂♃♄♅♆♇♈♉♊♋♌♍♎♏♐♑♒♓♔♕♖♗♘♙♚♛♜♝♞♟♠♡♢♣♤♥♦♧♨♩♪♫♬♭♮♯";
const box = document.getElementById("symBox");
for(let s of syms) {
    let d = document.createElement("div");
    d.className = "sym";
    d.innerText = s;
    d.onclick = () => { navigator.clipboard.writeText(s); alert("تم نسخ الرمز: " + s); };
    box.appendChild(d);
}
</script>
</body>
</html>
