<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>👑 زخرفة الأسماء</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Cairo,sans-serif}
body{
background:#0d1117;
color:#fff;
padding:20px;
}
h1{
text-align:center;
margin:20px;
color:#ffb700;
}
.container{
max-width:700px;
margin:auto;
}
input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:20px;
outline:none;
margin-bottom:15px;
}
button{
width:100%;
padding:15px;
background:#ff9800;
color:#fff;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}
button:hover{
background:#ffb700;
}
.result{
margin-top:20px;
display:grid;
gap:10px;
}
.item{
background:#161b22;
padding:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
.copy{
width:auto;
padding:8px 15px;
font-size:14px;
}
footer{
margin-top:40px;
text-align:center;
opacity:.7;
}
</style>
</head>

<body>

<div class="container">

<h1>👑 زخرفة الأسماء</h1>

<input id="name" placeholder="اكتب اسمك">

<button onclick="decorate()">زخرف الآن</button>

<div id="results" class="result"></div>

</div>

<footer>
صنع بواسطة Mohsen
</footer>

<script>

const styles=[
n=>"★"+n+"★",
n=>"♛"+n+"♛",
n=>"꧁"+n+"꧂",
n=>"『"+n+"』",
n=>"【"+n+"】",
n=>"✿"+n+"✿",
n=>"⚡"+n+"⚡",
n=>"🔥"+n+"🔥",
n=>"☠"+n+"☠",
n=>"👑"+n+"👑",
n=>"༺"+n+"༻",
n=>"❖"+n+"❖",
n=>"✧"+n+"✧",
n=>"✦"+n+"✦",
n=>"◥"+n+"◤",
n=>"◣"+n+"◢",
n=>"♚"+n+"♚",
n=>"☬"+n+"☬",
n=>"༒"+n+"༒",
n=>"✪"+n+"✪"
];

function decorate(){

const name=document.getElementById("name").value.trim();

const box=document.getElementById("results");

box.innerHTML="";

if(name==""){
alert("اكتب اسمك");
return;
}

styles.forEach(f=>{

const text=f(name);

box.innerHTML+=`
<div class="item">
<span>${text}</span>
<button class="copy" onclick="copyName('${text}')">نسخ</button>
</div>
`;

});

}

function copyName(text){

navigator.clipboard.writeText(text);

alert("تم النسخ");

}

</script>

</body>
</html>
