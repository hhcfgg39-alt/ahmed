<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>👑 VexioX | المنصة الأسطورية للزخرفة</title>
    <style>
        :root { --gold: #ffcc00; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        .hero { max-width: 800px; margin: 50px auto; background: var(--glass); backdrop-filter: blur(15px); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        h1 { font-size: 3.5rem; margin-bottom: 10px; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        input { width: 80%; padding: 20px; border-radius: 20px; border: none; background: rgba(0,0,0,0.3); color: var(--gold); font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        .btn { padding: 20px 50px; background: linear-gradient(to right, #ffcc00, #ff6600); border: none; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--gold); }
        #res { margin-top: 30px; font-size: 3rem; font-weight: bold; color: white; min-height: 80px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; margin-top: 30px; }
        .s-card { background: var(--glass); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 2rem; }
        .s-card:hover { background: var(--gold); color: black; transform: translateY(-5px); }
    </style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8544712694031374"
     crossorigin="anonymous"></script>
</head>
<body>

<div class="hero">
    <h1>VexioX Elite</h1>
    <p>أرقى الزخارف الاحترافية في مكان واحد</p>
    <input type="text" id="in" placeholder="اكتب اسمك الفخم...">
    <br>
    <button class="btn" onclick="gen()">توليد الزخرفة الآن ✨</button>
    <div id="res">---</div>
</div>

<div class="hero">
    <h2>⚜️ مخزن الرموز النادرة</h2>
    <div class="grid" id="box"></div>
</div>

<script>
function gen() {
    let n = document.getElementById("in").value || "الاسم";
    let p = ["♛","★","⚡","『","꧁","彡","シ","×","✧","❃","ஜ","✪","➤","✠","ツ","❦","Ω","۞","♚","♠","♣","♥","♦","✹","✺","✻","✼","✽"];
    document.getElementById("res").innerText = p[Math.floor(Math.random()*p.length)] + " " + n + " " + p[Math.floor(Math.random()*p.length)];
}

const syms = "♛★⚡『꧁彡〆シ×✧❃ஜ✪➤✠웃ツ❦Ω۞♚♠♣♥♦☀☁☂☃☄★☆☇☈☉☊☋☌☍☎☏☐☑☒☓☖☗☘☙☚☛☜☝☞☟☠☡☢☣☤☥☦☧☨☩☪☫☬☭☮☯☰☱☲☳☴☵☶☷☸☹☺☻☼☽☾☿♀♁♂♃♄♅♆♇♈♉♊♋♌♍♎♏♐♑♒♓♔♕♖♗♘♙♚♛♜♝♞♟♠♡♢♣♤♥♦♧♨♩♪♫♬♭♮♯";
const box = document.getElementById("box");
for(let s of syms) {
    let d = document.createElement("div");
    d.className = "s-card";
    d.innerText = s;
    d.onclick = () => { navigator.clipboard.writeText(s); alert("نسخت الرمز: " + s); };
    box.appendChild(d);
}
</script>
</body>
</html>
