<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>рҹ‘‘ Щ…ЩҲЩӮШ№ ШІШ®ШұЩҒШ© Ш§Щ„ШЈШіЩ…Ш§ШЎ Ш§Щ„ШЈШіШ·ЩҲШұЩҠ рҹ‘‘</title>
    <style>
        :root { --gold: #ffb700; --dark-bg: #0b0b0f; --card-bg: #14141f; --text-color: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark-bg); color: var(--text-color); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 600px; margin: 20px auto; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(255,183,0,0.2); }
        h1 { color: var(--gold); font-size: 24px; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid var(--gold); background: #222; color: white; text-align: center; font-size: 18px; margin-bottom: 15px; }
        button { padding: 12px 25px; background: var(--gold); border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        #result { margin-top: 20px; font-size: 28px; padding: 20px; border: 1px dashed var(--gold); color: var(--gold); border-radius: 10px; }
        #symbols-box { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; max-height: 250px; overflow-y: scroll; padding: 10px; background: #1c1c28; border-radius: 10px; margin-top: 15px; }
        .sym-item { background: #2a2a3a; padding: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .sym-item:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1>рҹ‘‘ Щ…ЩҲЩ„ШҜ Ш§Щ„ШІШ®ШұЩҒШ© Ш§Щ„ШЈШіШ·ЩҲШұЩҠ рҹ‘‘</h1>
    <input type="text" id="nameInput" placeholder="Ш§ЩғШӘШЁ Ш§ШіЩ…Щғ ЩҮЩҶШ§...">
    <button onclick="generateDecor()">вңЁ ШІШ®ШұЩҒ Ш§ШіЩ…ЩҠ Ш§Щ„ШўЩҶ вңЁ</button>
    <div id="result">Ш§Щ„ЩҶШӘЩҠШ¬Ш© ШіШӘШёЩҮШұ ЩҮЩҶШ§...</div>
</div>

<div class="container">
    <h2>рҹ”ұ Щ…ЩғШӘШЁШ© Ш§Щ„ШұЩ…ЩҲШІ Ш§Щ„Ш§ШӯШӘШұШ§ЩҒЩҠШ©</h2>
    <div id="symbols-box"></div>
</div>

<script>
function generateDecor() {
    let name = document.getElementById("nameInput").value || "Ш§Щ„Ш§ШіЩ…";
    let p = ["вҷӣ", "вҳ…", "вҡЎ", "гҖҺ", "к§Ғ", "еҪЎ", "гҖҶ", "гӮ·", "Г—", "вң§", "вқғ", "а®ң", "вңӘ", "вһӨ", "вң ", "мӣғ", "гғ„", "вқҰ", "О©", "Ыһ", "вҷҡ", "вҷ ", "вҷЈ", "вҷҘ", "вҷҰ", "вҳў", "вҳЈ"];
    let res = p[Math.floor(Math.random() * p.length)] + " " + name + " " + p[Math.floor(Math.random() * p.length)];
    document.getElementById("result").innerText = res;
}

const symbols = "вҷӣвҳ…вҡЎгҖҺк§ҒеҪЎгҖҶгӮ·Г—вң§вқға®ңвңӘвһӨвң мӣғгғ„вқҰО©Ыһвҷҡвҷ вҷЈвҷҘвҷҰвҳҖвҳҒвҳӮвҳғвҳ„вҳ…вҳҶвҳҮвҳҲвҳүвҳҠвҳӢвҳҢвҳҚвҳҺвҳҸвҳҗвҳ‘вҳ’вҳ“вҳ–вҳ—вҳҳвҳҷвҳҡвҳӣвҳңвҳқвҳһвҳҹвҳ вҳЎвҳўвҳЈвҳӨвҳҘвҳҰвҳ§вҳЁвҳ©вҳӘвҳ«вҳ¬вҳӯвҳ®вҳҜвҳ°вҳұвҳІвҳівҳҙвҳөвҳ¶вҳ·вҳёвҳ№вҳәвҳ»вҳјвҳҪвҳҫвҳҝвҷҖвҷҒвҷӮвҷғвҷ„вҷ…вҷҶвҷҮвҷҲвҷүвҷҠвҷӢвҷҢвҷҚвҷҺвҷҸвҷҗвҷ‘вҷ’вҷ“вҷ”вҷ•вҷ–вҷ—вҷҳвҷҷвҷҡвҷӣвҷңвҷқвҷһвҷҹвҷ вҷЎвҷўвҷЈвҷӨвҷҘвҷҰвҷ§вҷЁвҷ©вҷӘвҷ«вҷ¬вҷӯвҷ®вҷҜк§Ғајәвҷӣај»к§Ӯк§ҒајәвӮҰРҮвӮҰв„‘вӮіај»к§ӮгҖҗвҳ…гҖ‘гҖҗвҳҶгҖ‘гҖҗвҷ•гҖ‘гҖҗвҷӣгҖ‘гҖҗвҷҡгҖ‘гҖҗвҷ”гҖ‘гҖҗвҷңгҖ‘гҖҗвҷ–гҖ‘гҖҗвҷқгҖ‘гҖҗвҷ—гҖ‘гҖҗвҷһгҖ‘гҖҗвҷҳгҖ‘гҖҗвҷҹгҖ‘гҖҗвҷҷгҖ‘вҳўвҳЈвҳ вң§вңҰвқӢвқғвқҠвқүвңҫвңҪвңјвңҝвқҖвқҒвқӮвқ„вқ…вқҶвқҮвқҲвқүвқҠвқӢв–‘в–’в–“в–Ҳ";
const box = document.getElementById("symbols-box");
for(let char of symbols) {
    let div = document.createElement("div");
    div.className = "sym-item";
    div.innerHTML = char;
    div.onclick = function() { navigator.clipboard.writeText(char); alert("ШӘЩ… Ш§Щ„ЩҶШіШ®: " + char); };
    box.appendChild(div);
}
</script>

</body>
</html>
