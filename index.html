<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <title>مستخرج النصوص</title>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-3xl font-bold mb-6 text-blue-500">استخراج النص من الصور</h1>
    <div class="bg-slate-900 p-8 rounded-3xl w-96 border border-slate-700 shadow-2xl">
        <input type="file" id="img" class="mb-4 w-full text-sm text-gray-400">
        <button onclick="start()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold">بدء الاستخراج</button>
        <textarea id="res" class="w-full mt-6 h-32 bg-black p-4 rounded-xl text-white" placeholder="النتيجة هتظهر هنا..."></textarea>
    </div>

    <script>
        async function start() {
            const img = document.getElementById('img').files[0];
            const res = document.getElementById('res');
            res.value = "جاري المعالجة.. ثواني وهتخلص";
            const { data: { text } } = await Tesseract.recognize(img, 'ara+eng');
            res.value = text;
        }
    </script>
</body>
</html>
