<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        .light { background-color: #f1f5f9; color: #1e293b; }
        .dark { background-color: #020617; color: white; }
    </style>
</head>
<body class="dark transition-colors duration-500 min-h-screen flex flex-col items-center justify-center p-4">

    <button onclick="toggleTheme()" class="mb-6 px-6 py-2 bg-slate-700 rounded-full font-bold shadow-lg hover:scale-105 transition-all">
        تبديل الوضع 🌙/☀️
    </button>

    <div class="bg-slate-900/60 backdrop-blur-2xl p-8 rounded-[2rem] w-full max-w-lg border border-slate-700 shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-1 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">OCR Pro AI</h1>
        <p class="text-slate-400 mb-8 font-medium">أداة احترافية لاستخراج النصوص</p>

        <label id="dropZone" for="img" class="cursor-pointer block w-full py-10 mb-6 border-2 border-dashed border-slate-600 rounded-3xl hover:border-blue-500 transition-all">
            <span id="fileName">📁 اضغط لاختيار صورة</span>
            <input type="file" id="img" class="hidden" onchange="updateUI()">
        </label>

        <button id="mainBtn" onclick="start()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-lg transition-all shadow-xl text-white">
            بدء التحليل
        </button>
        
        <button id="clearBtn" onclick="resetApp()" class="w-full py-3 mt-3 bg-red-600 hover:bg-red-700 rounded-2xl font-bold hidden text-white">
            إضافة صورة جديدة ➕
        </button>

        <!-- مربع النتيجة (readonly) -->
        <textarea id="res" readonly class="w-full mt-6 h-40 bg-black/50 p-5 rounded-2xl border border-slate-700 outline-none focus:border-blue-500" placeholder="النتيجة تظهر هنا..."></textarea>
        
        <!-- زر النسخ -->
        <button id="copyBtn" onclick="copyText()" class="w-full py-2 mt-2 bg-green-600 hover:bg-green-700 rounded-xl font-bold hidden">
            نسخ النص 📋
        </button>
    </div>

    <p class="mt-8 text-slate-500 font-semibold">تم إنشاء هذا الموقع بواسطة Ahmed</p>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        function updateUI() {
            const input = document.getElementById('img');
            const label = document.getElementById('fileName');
            if(input.files.length > 0) label.innerText = "✅ " + input.files[0].name;
        }

        function copyText() {
            const res = document.getElementById('res');
            res.select();
            document.execCommand('copy');
            alert("تم نسخ النص!");
        }

        function resetApp() {
            document.getElementById('res').value = "";
            document.getElementById('fileName').innerText = "📁 اضغط لاختيار صورة";
            document.getElementById('img').value = "";
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
            document.getElementById('mainBtn').classList.remove('hidden');
            document.getElementById('mainBtn').innerText = "بدء التحليل"; // إرجاع الزر لطبيعته
        }

        async function start() {
            const input = document.getElementById('img');
            const res = document.getElementById('res');
            const btn = document.getElementById('mainBtn');
            const clearBtn = document.getElementById('clearBtn');
            const copyBtn = document.getElementById('copyBtn');
            
            if(input.files.length === 0) return alert("اختر صورة أولاً!");
            
            btn.innerText = "جاري التحليل...";
            const { data: { text } } = await Tesseract.recognize(input.files[0], 'ara+eng');
            
            res.value = text;
            btn.classList.add('hidden'); 
            clearBtn.classList.remove('hidden');
            copyBtn.classList.remove('hidden');
        }
    </script>
</body>
</html>
