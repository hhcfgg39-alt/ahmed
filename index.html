<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VexioX Elite | زخرفة احترافية</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; min-height: 100vh; 
        }
        .container { 
            max-width: 600px; margin: auto; background: rgba(255, 255, 255, 0.05); 
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); 
        }
        h1 { color: #ffcc00; font-size: 2.5rem; text-shadow: 0 0 10px #ffcc00; }
        input { 
            width: 90%; padding: 15px; margin-bottom: 20px; border-radius: 10px; 
            border: none; font-size: 1.2rem; text-align: center; 
        }
        .btn-box { display: flex; justify-content: center; gap: 10px; }
        .action-btn { 
            padding: 15px 25px; border-radius: 10px; border: none; font-weight: bold; 
            background: #ffcc00; cursor: pointer; transition: 0.3s; 
        }
        .action-btn:hover { transform: scale(1.05); }
        #res { font-size: 2rem; color: #ffcc00; margin-top: 20px; min-height: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>VexioX Elite</h1>
    <input type="text" id="in" placeholder="اكتب اسمك هنا...">
    <div class="btn-box">
        <button class="action-btn" onclick="randomName()">اسم عشوائي 🎲</button>
        <button class="action-btn" onclick="gen()">زخرفة ✨</button>
    </div>
    <div id="res">---</div>
</div>
</script>
<section class="result">

<h2 style="text-align:center;margin:40px 0 20px;">
✨ الزخارف المميزة
</h2>

<div class="result-list" id="extraResults"></div>

</section>

<section style="padding:40px">

<h2 style="text-align:center;margin-bottom:20px">
🔥 رموز مميزة
</h2>

<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center">

<button class="copy" onclick="copyText('★')">★</button>
<button class="copy" onclick="copyText('♛')">♛</button>
<button class="copy" onclick="copyText('꧁꧂')">꧁꧂</button>
<button class="copy" onclick="copyText('⚡')">⚡</button>
<button class="copy" onclick="copyText('🔥')">🔥</button>
<button class="copy" onclick="copyText('💀')">💀</button>
<button class="copy" onclick="copyText('☠')">☠</button>
<button class="copy" onclick="copyText('👑')">👑</button>
<button class="copy" onclick="copyText('✿')">✿</button>
<button class="copy" onclick="copyText('❖')">❖</button>

</div>

</section>

<script>

const extra=[

n=>"◥"+n+"◤",
n=>"◣"+n+"◢",
n=>"♕"+n+"♕",
n=>"✦"+n+"✦",
n=>"✧"+n+"✧",
n=>"❀"+n+"❀",
n=>"✪"+n+"✪",  
</script>
<!-- أدوات إضافية -->

<div style="margin:30px 0;text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">

<button onclick="copyAll()">📋 نسخ الكل</button>

<button onclick="clearAll()">🗑 مسح</button>

<button onclick="toggleMode()">🌙 تغيير الوضع</button>

</div>

<p id="counter" style="text-align:center;font-size:18px;margin:15px 0;">
عدد الأحرف: 0
</p>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
⬆
</button>

<style>

#topBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border:none;
border-radius:50%;
background:#ffb700;
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,183,0,.5);
}

#topBtn:hover{
transform:scale(1.1);
transition:.3s;
}

.item{
transition:.3s;
}

.item:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,183,0,.4);
}

.light{
background:#f5f5f5;
color:#111;
}

.light .card,
.light .item,
.light header,
.light footer{
background:#ffffff;
color:#111;
}

</style>

<script>

document.getElementById("name").addEventListener("input",function(){

document.getElementById("counter").innerHTML=
"عدد الأحرف: "+this.value.length;

decorate();

});

function copyAll(){

let txt="";

document.querySelectorAll(".item span").forEach(e=>{

txt+=e.innerText+"\n";

});

navigator.clipboard.writeText(txt);

alert("✅ تم نسخ جميع الزخارف");

}

function clearAll(){

document.getElementById("name").value="";

document.getElementById("results").innerHTML="";

document.getElementById("counter").innerHTML="عدد الأحرف: 0";

}

function toggleMode(){

document.body.classList.toggle("light");

localStorage.setItem(
"theme",
document.body.classList.contains("light")
?"light":"dark"
);

}

window.onload=function(){

if(localStorage.getItem("theme")=="light"){

document.body.classList.add("light");

}

}

</script>

</body>
</html>
