<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 موقع زخرفة الأسماء الأسطوري 👑</title>
    <style>
        :root {
            --gold: #ffb700;
            --dark-bg: #0b0b0f;
            --card-bg: #14141f;
            --text-color: #ffffff;
            --neon-glow: 0 0 15px rgba(255, 183, 0, 0.4);
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .container {
            max-width: 550px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: var(--neon-glow);
            border: 2px solid var(--gold);
        }

        h1 {
            color: var(--gold);
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,183,0,0.5);
        }

        .subtitle {
            color: #8a8a9e;
            font-size: 13px;
            margin-bottom: 25px;
        }

        input {
            width: 85%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            background: #1c1c28;
            border: 2px solid #333;
            color: #fff;
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: var(--neon-glow);
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
            background: #1c1c28;
            padding: 6px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #8a8a9e;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: var(--neon-glow);
        }

        .results-container {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .decoration-card {
            background: #1c1c28;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d2d3f;
            transition: 0.3s;
        }

        .decoration-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .name-text {
            font-size: 19px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .copy-action {
            background: linear-gradient(135deg, #ffb700, #ff8800);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .copy-action:hover {
            transform: scale(1.05);
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 7, 0.97);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .popup-box {
            background: #14141f;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--gold);
            max-width: 300px;
            box-shadow: var(--neon-glow);
        }

        .popup-box h3 { color: var(--gold); margin-top: 0; }
        .counter-num { font-size: 40px; font-weight: bold; color: #ff3333; margin: 15px 0; }
    </style>

   <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8544712694031374"
     crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <h1>👑 زخرفة الأسماء الاحترافية</h1>
    <p class="subtitle">اصنع اسمك الأسطوري للألعاب والملفات الشخصية بضغطة واحدة</p>
    
    <input type="text" id="userInput" placeholder="اكتب الاسم هنا للزخرفة..." oninput="showNames()">

    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('vip')">زخارف VIP 🔥</button>
        <button class="tab-btn" onclick="changeCategory('symbols')">رموز نادرة 🔱</button>
    </div>

    <div class="results-container" id="resultsBox"></div>
</div>

<div class="popup-overlay" id="adPopup">
    <div class="popup-box">
        <h3>جاري تجهيز الزخرفة النادرة... 🎥</h3>
        <p style="color: #aaa; font-size: 13px;">انتظر انتهاء العداد لنسخ الاسم تلقائياً</p>
        <div class="counter-num" id="countdown">3</div>
    </div>
</div>

<script>
    let activeTab = 'vip';
    let textToCopy = '';

    // قائمة زخارف VIP الضخمة والمحدثة للألعاب 🎮
    const vipStyles = [
        (t) => `亗 『 ${t} 』 亗`,
        (t) => ` 👑 ꧁ ${t} ꧂ 👑`,
        (t) => `𓆩 ${t} 𓆪`,
        (t) => ` メ ${t} メ`,
        (t) => ` ⚡ ${t} ⚡`,
        (t) => ` ╰vｲo╮ ${t} 𓆩𓆪`,
        (t) => ` ⚔️ 𝔖𝔑ℑ𝔓𝔈ℜ | ${t} ⚔️`,
        (t) => ` 🔥 𝓥𝓔𝓧𝓘𝓞𝓧 | ${t} 🔥`,
        (t) => `v_⚡『 ${t} 』⚡_v`,
        (t) => `Ꮻ Godzilla 『 ${t} 』`,
        (t) => `™ ᶠᶠ ꧁ ${t} ꧂`,
        (t) => `×  ${t}  × 亗`,
        (t) => ` ⁝ ${t} ⁝ 𓆩𓆪`,
        (t) => ` ⚚ ${t} ⚚`,
        (t) => `卍 『 ${t} 』 卍`,
        (t) => `『 𝓥 』 ${t} 👑`,
        (t) => `☣️〖 ${t} 〗☣️`,
        (t) => `⫷ ${t} ⫸`,
        (t) => `☠️ 𓊈 ${t} 𓊉 ☠️`,
        (t) => `꧁☠️ ${t} ☠️꧂`,
        (t) => `𓃠 ${t} 𓃠`,
        (t) => `✿ ${t} ✿`,
        (t) => ` बाप 『 ${t} 』 बाप`,
        (t) => `〆 ${t} 〆`,
        (t) => `么 ${t} 么`,
        (t) => `『 OP 』 ${t} ⚡`,
        (t) => `𓅓 ${t} 𓅓`,
        (t) => `☯️ 【 ${t} 】 ☯️`,
        (t) => `☾ ${t} ☽`,
        (t) => `〠 ${t} 〠`
    ];

    // قائمة الرموز النادرة والمحدثة 🔱
    const rareSymbols = [
        " 亗 (تاج الفخامة الأسطوري)", 
        " 𓆩𓆪 (أجنحة الصقر النادرة)", 
        " 🎴 (الشعار الملكي الياباني)",
        " 👑 (التاج الذهبي الملكي)", 
        " ⚔️ (السيوف المتقاطعة للقتال)", 
        " 🔥 (علامة الغضب النارية)",
        " 𝓥 (علامة الفريفير الأصلية للتحقق)", 
        " ☠️ (الجمجمة المرعبة)",
        " ⚡ (البرق النيون الخاطف)", 
        " ☣️ (تحذير الخطر البيولوجي)", 
        " 𓆩★𓆪 (النجمة السحرية المحاطة بأجنحة)",
        " ☯️ (شعار اليانغ والين للتوازن)",
        " ╾━╤デ╦︻ (قناص الـ AWM المدمر)",
        " ▄︻デ═一 (رشاش القتال السريع)",
        " 𓆉 (رمز السلحفاة النادر للملف الشخصي)",
        " 𓃭 (رمز الأسد المفترس)",
        " 💎 (الماسة الزرقاء النقية)",
        " 🌀 (الإعصار والدوامة النادرة)",
        " 亗 KING 亗 (لقب الملك المستقل)",
        " 𓎂𓎂 (موجات القوة الغامضة)"
    ];

    function showNames() {
        const val = document.getElementById('userInput').value.trim() || "Name";
        const box = document.getElementById('resultsBox');
        box.innerHTML = '';

        if (activeTab === 'vip') {
            vipStyles.forEach(style => addCard(style(val)));
        } else {
            rareSymbols.forEach(sym => addCard(sym));
        }
    }

    function addCard(finalText) {
        const box = document.getElementById('resultsBox');
        const card = document.createElement('div');
        card.className = 'decoration-card';
        card.innerHTML = `
            <span class="name-text">${finalText}</span>
            <button class="copy-action" onclick="startCopyProcess('${finalText}')">نسخ 📋</button>
        `;
        box.appendChild(card);
    }

    function changeCategory(cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        activeTab = cat;
        showNames();
    }

    function startCopyProcess(text) {
        textToCopy = text;
        const overlay = document.getElementById('adPopup');
        overlay.style.display = 'flex';
        
        let seconds = 3;
        const timer = document.getElementById('countdown');
        timer.innerText = seconds;
        
        let run = setInterval(() => {
            seconds--;
            timer.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(run);
                overlay.style.display = 'none';
                navigator.clipboard.writeText(textToCopy);
                alert("تم نسخ الزخرفة الأسطورية بنجاح! 👑");
            }
        }, 1000);
    }

    showNames();
</script>
<div class="container" style="margin-top: 30px; text-align: center; background: #222; padding: 20px; border-radius: 15px; border: 1px solid var(--gold);">
    <h2 style="color: var(--gold);">✨ مولد الزخرفة الفوري ✨</h2>
    <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." style="padding: 10px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px;">
    <button onclick="generateDecor()" style="padding: 10px 20px; background: var(--gold); border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">زخرف الآن!</button>
    <div id="result" style="margin-top: 20px; font-size: 24px; color: white; min-height: 50px;"></div>
</div>

<script>
function generateDecor() {
    let name = document.getElementById("nameInput").value;
    if(name === "") return;
    let decors = [
        "♛ " + name + " ♛",
        "★彡[" + name + "]彡★",
        "⚡ " + name + " ⚡",
        "『" + name + "』",
        "꧁ " + name + " ꧂"
    ];
    let randomDecor = decors[Math.floor(Math.random() * decors.length)];
    document.getElementById("result").innerHTML = randomDecor;
}
</script>
</body>
</html>
