<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); } 50% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); } }
        .glowing { animation: pulse-glow 2s infinite; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900/60 backdrop-blur-2xl p-8 rounded-[2rem] w-full max-w-lg border border-slate-700 shadow-2xl text-center">
        <h1 class="text-4xl font-black mb-1 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">OCR Pro AI</h1>
        <p class="text-slate-400 mb-8 font-medium">الذكاء الاصطناعي الأسرع لاستخراج النصوص</p>

        <label id="dropZone" for="img" class="cursor-pointer block w-full py-10 mb-6 border-2 border-dashed border-slate-600 rounded-3xl hover:border-blue-500 transition-all text-slate-300">
            <span id="fileName">📁 اضغط لاختيار صورة</span>
            <input type="file" id="img" class="hidden" onchange="updateUI()">
        </label>

        <button id="mainBtn" onclick="start()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-lg transition-all transform active:scale-95 shadow-xl">
            بدء التحليل
        </button>
        
        <button id="resetBtn" onclick="resetApp()" class="w-full py-3 mt-3 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold hidden transition-all">
            اختيار صورة أخرى 🔄
        </button>

        <textarea id="res" class="w-full mt-6 h-40 bg-black/50 p-5 rounded-2xl text-white border border-slate-700 outline-none focus:border-blue-500" placeholder="النتيجة تظهر هنا..."></textarea>
    </div>

    <script>
        function updateUI() {
            const input = document.getElementById('img');
            const label = document.getElementById('fileName');
            if(input.files.length > 0) {
                label.innerText = "✅ " + input.files[0].name;
            }
        }

        async function start() {
            const input = document.getElementById('img');
            const res = document.getElementById('res');
            const btn = document.getElementById('mainBtn');
            
            if(input.files.length === 0) return alert("اختر صورة أولاً!");
            
            btn.classList.add('glowing');
            btn.innerText = "جاري التحليل...";
            
            const { data: { text } } = await Tesseract.recognize(input.files[0], 'ara+eng');
            
            res.value = text;
            btn.innerText = "تم بنجاح! 🎉";
            btn.classList.remove('glowing');
            document.getElementById('resetBtn').classList.remove('hidden');
        }

        function resetApp() {
            location.reload(); // أسهل وأسرع طريقة لمسح كل شيء والبدء من جديد
        }
    </script>
</body>
</html>
