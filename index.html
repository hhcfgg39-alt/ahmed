<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VexioX Elite | أكبر مكتبة زخرفة</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <style>
        body { background: #0f0c29; background: linear-gradient(to right, #24243e, #302b63, #0f0c29); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); }
        h1 { color: #ffcc00; }
        input { width: 70%; padding: 15px; border-radius: 10px; border: none; font-size: 1.2rem; }
        button { padding: 15px 25px; margin: 10px; border-radius: 10px; border: none; background: #ffcc00; cursor: pointer; font-weight: bold; }
        #res { font-size: 2rem; color: #fff; margin: 20px; padding: 20px; border: 2px dashed #ffcc00; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
        .char { background: #333; padding: 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .char:hover { background: #ffcc00; color: black; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8544712694031374"
     crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <h1>VexioX Elite للزخرفة</h1>
    <input type="text" id="in" placeholder="اكتب اسمك الفخم هنا...">
    <br>
    <button onclick="randomName()">اسم عشوائي 🎲</button>
    <button onclick="gen()">زخرفة الاسم ✨</button>
    <div id="res">---</div>

    <h2>زخارف جاهزة (اضغط للنسخ)</h2>
    <div class="grid" id="box"></div>
</div>

<script>
function gen() {
    let n = document.getElementById("in").value || "الاسم";
    let p = ["♛","★","⚡","『","꧁","彡","×","✧","❃","ஜ","✪"];
    document.getElementById("res").innerText = p[Math.floor(Math.random()*p.length)] + " " + n + " " + p[Math.floor(Math.random()*p.length)];
}

function randomName() {
    const names = ["Grim Reaper", "Shadow Strike", "Sniper Legend", "𝓢𝓷𝓲𝓹𝓮𝓻", "Venom X", "Toxic Hunter", "『LØRD』๖ۣۜƤhoenix", "☠️𝙱𝙻𝙰𝙲𝙺 𝙺𝙸𝙽𝙶☠️", "𝓖𝓞𝓓 𝓞𝓕 𝓦𝓐𝓡", "亗قـاهـرهـم亗", "ØالـكـابـوسØ", "٭الـقـاتـل٭", "卍الـمـجـرم卍", "々سـفـاح々", "『E』GHOST", "父الـجـزار父", "〆الـمـرعـب〆", "الملكة ꧂", "彡 أميرة الورد 彡", "ズ الأمـ♥ـيرة ズ", "★ القمـر ★", "♛ سيدة القصر ♛", "气 ريحانة الجنة 气", "✿ زهرة اللوتس ✿", "⦇ سحاب ⦈", "᚛ الـرؤى ᚜", "░ مـلاذ", "꧁ ℛ𝒪𝒮ℰ ꧂", "✧ 𝕼𝖚𝖊𝖊𝖓 ✧", "★ 𝓑𝓪𝓫𝔂 𝓖𝓲𝓻𝓵 ★", "☽ ℳℴℴ𝓃𝓁𝒾ℊ𝒽𝓉 ☽", "✿ 𝒲𝒾𝓃𝓉ℰ𝓇 ✿", "♛ 𝓥𝓲𝓿𝓲𝓪𝓷 ♛", "彡 𝔇𝔦𝔞𝔪𝔬𝓫𝓡 彡", "⦇ 𝓢𝓴𝔂 ⦈", "气 ℱ𝒾𝓇ℯ ℬ𝒾𝓇𝒹 气"];
    let r = names[Math.floor(Math.random() * names.length)];
    document.getElementById("in").value = r;
    document.getElementById("res").innerText = r;
}

const syms = "♛★⚡『꧁彡シ×✧❃ஜ✪➤✠ツ❦Ω۞♚♠♣♥♦☀☁☂☃☄★☆☇☈☉☊☋☌☍";
const box = document.getElementById("box");
for(let s of syms) {
    let d = document.createElement("div");
    d.className = "char";
    d.innerText = s;
    d.onclick = () => { navigator.clipboard.writeText(s); alert("تم النسخ: " + s); };
    box.appendChild(d);
}
</script>
</body>
</html>
