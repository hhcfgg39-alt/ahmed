    <style>
        :root {
            --gold: #ffb700;

            --text-color: #ffffff;

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .container {
            max-width: 550px;
            margin: 20px auto;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: var(--neon-glow);
            border: 2px solid var(--gold);
        }

        h1 {
            color: var(--gold);
            font-size: 26px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,183,0,0.5);
        }

        .subtitle {
            color: #8a8a9e;
            font-size: 13px;
            margin-bottom: 25px;
        }

        input {
            width: 85%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            background: #1c1c28;
            border: 2px solid #333;
            color: #fff;
            border-radius: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: var(--neon-glow);
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
            background: #1c1c28;
            padding: 6px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: #8a8a9e;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .tab-btn.active, .tab-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: var(--neon-glow);
        }

        .results-container {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .decoration-card {
            background: #1c1c28;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2d2d3f;
            transition: 0.3s;
        }

        .decoration-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .name-text {
            font-size: 19px;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .copy-action {
            background: linear-gradient(135deg, #ffb700, #ff8800);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .copy-action:hover {
            transform: scale(1.05);
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 7, 0.97);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .popup-box {
            background: #14141f;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--gold);
            max-width: 300px;
            box-shadow: var(--neon-glow);
        }

        .popup-box h3 { color: var(--gold); margin-top: 0; }
        .counter-num { font-size: 40px; font-weight: bold; color: #ff3333; margin: 15px 0; }
    </style>

<script>
    function showNames() {
        const val = document.getElementById('userInput').value.trim() || "Name";
        const box = document.getElementById('resultsBox');
        box.innerHTML = '';

        if (activeTab === 'vip') {
            vipStyles.forEach(style => addCard(style(val)));
        } else {
            rareSymbols.forEach(sym => addCard(sym));
        }
    }

    function addCard(finalText) {
        const box = document.getElementById('resultsBox');
        const card = document.createElement('div');
        card.className = 'decoration-card';
        card.innerHTML = `
            <span class="name-text">${finalText}</span>
            <button class="copy-action" onclick="startCopyProcess('${finalText}')">نسخ 📋</button>
        `;
        box.appendChild(card);
    }

    function changeCategory(cat) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        activeTab = cat;
        showNames();
    }

    function startCopyProcess(text) {
        textToCopy = text;
        const overlay = document.getElementById('adPopup');
        overlay.style.display = 'flex';
        
        let seconds = 3;
        const timer = document.getElementById('countdown');
        timer.innerText = seconds;
        
        let run = setInterval(() => {
            seconds--;
            timer.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(run);
                overlay.style.display = 'none';
                navigator.clipboard.writeText(textToCopy);
                alert("تم نسخ الزخرفة الأسطورية بنجاح! 👑");
            }
        }, 1000);
    }

    showNames();
</script>

<script>
function generateSingleDecor() {
    let name = document.getElementById("nameInput").value;
    if(name === "") return;
    
    // قائمة تحتوي على تشكيلات متنوعة جداً
    let prefixes = ["♛", "★", "⚡", "『", "꧁", "彡", "〆", "シ", "×", "✧", "❃", "ஜ", "✪", "➤", "✠", "웃", "ツ", "❦", "Ω", "۞"];
    let suffixes = ["♛", "★", "⚡", "』", "꧂", "彡", "〆", "シ", "×", "✧", "❃", "ஜ", "✪", "➤", "✠", "웃", "ツ", "❦", "Ω", "۞"];
    
    let p = prefixes[Math.floor(Math.random() * prefixes.length)];
    let s = suffixes[Math.floor(Math.random() * suffixes.length)];
    
    // دمج عشوائي يولد أكثر من 100 احتمال
    let result = p + " " + name + " " + s;
    document.getElementById("result").innerText = result;
}
</script>
